$schema: vscode://schemas/color-theme
name: Dinosaur
author: Jonas Fernandes
semanticClass: theme.dinosaur
semanticHighlighting: true
dinosaur:
  base:
    - &BG "#151521"
    - &FG "#cccccc"
    - &SELECTION "#3a3d41"
    - &COMMENT "#858585"
    - &CYAN "#2df4df"
    - &GREEN "#6ef79f"
    - &ORANGE "#ffb86c"
    - &PINK "#fb9688"
    - &PURPLE "#c29cfa"
    - &RED "#ff6b4a"
    - &YELLOW "#fbe4d0"
  ansi:
    - &COLOR0 "#000000"
    - &COLOR1 "#cd3131"
    - &COLOR2 "#0dbc79"
    - &COLOR3 "#e5e510"
    - &COLOR4 "#2472c8"
    - &COLOR5 "#bc3fbc"
    - &COLOR6 "#11a8cd"
    - &COLOR7 "#e5e5e5"
    - &COLOR8 "#666666"
    - &COLOR9 "#f14c4c"
    - &COLOR10 "#23d18b"
    - &COLOR11 "#f5f543"
    - &COLOR12 "#3b8eea"
    - &COLOR13 "#d670d6"
    - &COLOR14 "#29b8db"
    - &COLOR15 "#e5e5e5"
  brightOther:
    # Temporary (awaiting fix)
    - &TEMP_QUOTES "#fbe4d0"
    - &TEMP_PROPERTY_QUOTES "#2df4df"
  other:
    - &SELECTION_WIDGET "#a74d25"
    - &LineHighlight "#ffffff0a"
    - &NonText "#ffffff1a"
    - &WHITE "#ffffff"
    - &TAB_DROP_BG "#3a3d4170"
    # UI Variants
    - &FGLight "#ededed"
    - &BGLighter "#454545"
    - &BGLight "#303031"
    - &BGDark "#1e1e2a"
    - &BGDarker "#151521"

# User Interface (more info: https://code.visualstudio.com/docs/getstarted/theme-color-reference)
colors:
  # Integrated Terminal Colors
  terminal.background: *BG
  terminal.foreground: *FG
  terminal.ansiBrightBlack: *COLOR8
  terminal.ansiBrightRed: *COLOR9
  terminal.ansiBrightGreen: *COLOR10
  terminal.ansiBrightYellow: *COLOR11
  terminal.ansiBrightBlue: *COLOR12
  terminal.ansiBrightMagenta: *COLOR13
  terminal.ansiBrightCyan: *COLOR14
  terminal.ansiBrightWhite: *COLOR15
  terminal.ansiBlack: *COLOR0
  terminal.ansiRed: *COLOR1
  terminal.ansiGreen: *COLOR2
  terminal.ansiYellow: *COLOR3
  terminal.ansiBlue: *COLOR4
  terminal.ansiMagenta: *COLOR5
  terminal.ansiCyan: *COLOR6
  terminal.ansiWhite: *COLOR7

  # Contrast Colors
  contrastBorder: # An extra border around elements to separate them from others for greater contrast
  contrastActiveBorder: # An extra border around active elements to separate them from others for greater contrast

  # Base Colors
  focusBorder: *YELLOW # Overall border color for focused elements. This color is only used if not overridden by a component
  foreground: *FG # Overall foreground color. This color is only used if not overridden by a component
  widget.shadow: "#0000005c" # Shadow color of widgets such as Find/Replace inside the editor
  selection.background: *SELECTION_WIDGET # Background color of text selections in the workbench (for input fields or text areas, does not apply to selections within the editor and the terminal)
  errorForeground: *RED # Overall foreground color for error messages (this color is only used if not overridden by a component)

  # Button Control
  button.background: *PINK # Button background color
  button.foreground: *SELECTION # Button foreground color
  button.border: # Button border color
  button.hoverBackground: "#f57f70" # Button background color when hovering
  button.secondaryBackground: *BG # Secondary button background color.
  button.secondaryForeground: *SELECTION # Secondary button foreground color.
  button.secondaryHoverBackground: "#45494e" # Secondary button background color when hovering.

  # Dropdown Control
  dropdown.background: *BG # Dropdown background
  dropdown.border: *COLOR0 # Dropdown border
  dropdown.foreground: *FG # Dropdown foreground

  # Input Control
  input.background: *BG # Input box background
  input.foreground: *FG # Input box foreground
  input.border: *COLOR0 # Input box border
  input.placeholderForeground: "#a6a6a6" # Input box foreground color for placeholder text
  inputOption.activeBorder: "#007acc00" # Border color of activated options in input fields
  inputValidation.infoForeground: # Input validation foreground color for information severity
  inputValidation.infoBackground: # Input validation background color for information severity
  inputValidation.infoBorder: # Input validation border color for information severity
  inputValidation.warningForeground: # Input validation foreground color for warning severity
  inputValidation.warningBackground: # Input validation background color for information warning
  inputValidation.warningBorder: # Input validation border color for warning severity
  inputValidation.errorForeground: # Input validation foreground color for error severity
  inputValidation.errorBackground: # Input validation background color for error severity
  inputValidation.errorBorder: # Input validation border color for error severity

  # Scroll Bar Control
  scrollbar.shadow: *BGDark # Scroll Bar shadow to indicate that the view is scrolled
  scrollbarSlider.activeBackground: # Slider background color when active
  scrollbarSlider.background: # Slider background color
  scrollbarSlider.hoverBackground: # Slider background color when hovering

  # Badge
  badge.foreground: *BG # Badge foreground color
  badge.background: *YELLOW # Badge background color

  # Progress Bar
  progressBar.background: *PINK # Background color of the progress bar shown for long running operations

  # List & Trees
  list.activeSelectionBackground: *SELECTION # List/Tree background color for the selected item when the list/tree is active
  list.activeSelectionForeground: *WHITE # List/Tree foreground color for the selected item when the list/tree is active
  list.dropBackground: *SELECTION # List/Tree drag and drop background when moving items around using the mouse
  list.focusBackground: *BG # List/Tree background color for the focused item when the list/tree is active
  list.highlightForeground: *PINK # List/Tree foreground color of the match highlights when searching inside the list/tree
  list.hoverBackground: *BG # List/Tree background when hovering over items using the mouse
  list.inactiveSelectionBackground: "#3a3d4174" # List/Tree background color for the selected item when the list/tree is inactive
  list.inactiveSelectionForeground: *FG # List/Tree foreground color for the selected item when the list/tree is inactive. An active list/tree has keyboard focus, an inactive does not
  list.warningForeground: # Color of warning decorations in the explorer
  list.errorForeground: # Color of error decorations in the explorer
  list.hoverForeground: *FG # List/Tree foreground when hovering over items using the mouse
  list.focusForeground: *FG # List/Tree foreground color for the focused item when the list/tree is active. An active list/tree has keyboard focus, an inactive does not

  # Activity Bar
  activityBar.background: *BG # Activity Bar background color
  activityBar.inactiveForeground: "#ffffff66" # Activity bar item foreground color when it is inactive
  activityBar.dropBackground: # Drag and drop feedback color for the Activity Bar items
  activityBar.foreground: *PINK # Activity bar foreground color (for example used for the icons)
  activityBar.border: # Activity Bar border color with the Side Bar
  activityBar.activeBorder: *PINK # Activity Bar indicator color
  activityBar.activeBackground: # Activity Bar indicator background color
  activityBarBadge.background: *YELLOW # Activity notification badge background color
  activityBarBadge.foreground: *BG # Activity notification badge foreground color

  # Side Bar
  sideBar.background: *BGDark # Side Bar background color
  sideBar.foreground: *FG # Side Bar foreground color. The Side Bar is the container for views like Explorer and Search
  sideBar.dropBackground: *SELECTION # Side Bar drag and drop background when moving views around using the mouse
  sideBar.border: # Side Bar border color on the side separating the editor
  sideBarTitle.foreground: *FGLight # Side Bar title foreground color
  sideBarSectionHeader.background: *BG # Side Bar section header background color
  sideBarSectionHeader.foreground: *PURPLE # Side Bar section header foreground color
  sideBarSectionHeader.border: "#cccccc33" # Side bar section header border color

  # Editor Group & Tabs
  editorGroup.emptyBackground: *BG # Background color of an empty editor group, when there are no editors opened. The background color shows up when dragging editors around
  editorGroup.background: # Background color of an editor group. The background color shows up when dragging editor groups around
  editorGroup.border: "#444444" # Color to separate multiple editor groups from each other
  editorGroup.dropBackground: # Background color when dragging editors around
  editorGroupHeader.noTabsBackground: # Background color of the editor group title header when Tabs are disabled
  editorGroupHeader.tabsBackground: *BG # Background color of the Tabs container
  editorGroupHeader.tabsBorder: # Border color of the editor group title header when tabs are enabled. Editor groups are the containers of editors
  tab.activeBackground: *BGDark # Active Tab background color
  tab.activeForeground: *YELLOW # Active Tab foreground color in an active group
  tab.border: # Border to separate Tabs from each other
  tab.activeBorderTop: !alpha [*PINK, 80] # A border drawn to the top of the active tab
  tab.activeBorder: "#00000000" # A border drawn to the bottom of the active tab
  tab.unfocusedActiveBorder: # A border drawn to the bottom of the active tab in an editor group that is not focused
  tab.inactiveBackground: *BG # Inactive Tab background color
  tab.inactiveForeground: "#fbe4d04c" # Inactive Tab foreground color in an active group
  tab.unfocusedActiveForeground: # Active tab foreground color in an inactive editor group
  tab.unfocusedInactiveForeground: # Inactive tab foreground color in an inactive editor group

  # Editor Colors
  editor.foreground: *FGLight
  editor.background: *BG
  editorLineNumber.foreground: *COMMENT
  editorLineNumber.activeForeground: *PINK
  editorCursor.foreground: "#b8b8c2"

  editor.selectionBackground: *SELECTION # Color of the editor selection
  editor.selectionHighlightBackground: "#add6ff26" # Color for regions with the same content as the selection
  editor.selectionHighlightBorder: "#b8b8c2" # Border color for regions with the same content as the selection
  editor.inactiveSelectionBackground: "#3a3d416e" # Color of the selection in an inactive editor
  editor.foldBackground: *SELECTION # Background color for folded ranges

  editor.wordHighlightBackground: "#575757b8" # Background color of a symbol during read-access, for example when reading a variable
  editor.wordHighlightStrongBackground: "#b8b8c26e" # Background color of a symbol during write-access, for example when writing to a variable

  editor.findMatchBackground: "#515c6a"
  editor.findMatchHighlightBackground: *SELECTION # Color of the other search matches
  editor.findRangeHighlightBackground: "#3a3d4166" # Color the range limiting the search

  editor.hoverHighlightBackground: "#264f7840" # Highlight below the word for which a hover is shown

  editor.lineHighlightBackground: "#ffffff0a" # Background color for the highlight of line at the cursor position
  editor.lineHighlightBorder: *BGDark # Background color for the border around the line at the cursor position

  editorLink.activeForeground: *PURPLE # Color of active links
  editor.rangeHighlightBackground: "#ffffff0b" # Background color of highlighted ranges, like by Quick Open and Find features

  editor.snippetTabstopHighlightBackground: # Highlight background color of a snippet tabstop
  editor.snippetTabstopHighlightBorder: # Highlight border color of a snippet tabstop
  editor.snippetFinalTabstopHighlightBackground: # Highlight background color of the final tabstop of a snippet
  editor.snippetFinalTabstopHighlightBorder: # Highlight border color of the final tabstop of a snippet

  editorWhitespace.foreground: "#e3e4e229" # Color of whitespace characters in the editor
  editorIndentGuide.background: "#404040" # Color of the editor indentation guides
  editorIndentGuide.activeBackground: "#707070" # Color of the active indentation guide
  editorRuler.foreground: "#5a5a5a" # Color of the editor rulers

  editorCodeLens.foreground: "#999999" # Foreground color of an editor CodeLens

  # NOTE: These are not set because they tend to be highly contested from
  # person to person. Thus, setting these is probably better suited
  # for workbench.colorCustomizations in User Settings
  editorBracketMatch.background: "#0064001a" # Background color behind matching brackets
  editorBracketMatch.border: "#888888" # Color for matching brackets boxes

  editorBracketHighlight.foreground1: *FG # Color of first pair of brackets
  editorBracketHighlight.foreground2: *PINK # Color of second pair of brackets
  editorBracketHighlight.foreground3: *CYAN # Color of third pair of brackets
  editorBracketHighlight.foreground4: *ORANGE # Color of fourth pair of brackets
  editorBracketHighlight.foreground5: *PURPLE # Color of fifth pair of brackets
  editorBracketHighlight.foreground6: *GREEN # Color of sixth pair of brackets
  editorBracketHighlight.unexpectedBracket.foreground: *RED # Color of bracket matching error

  editorOverviewRuler.border: "#7f7f7f4d" # Color of the overview ruler border
  editorOverviewRuler.background: "#25252500"

  editorError.foreground: "#f48771" # Foreground color of error squigglies in the editor
  editorError.background: "#B73A3400" # Background color of error squigglies in the editor
  editorError.border: "#ffffff00" # Border color of error squigglies in the editor
  editorWarning.foreground: "#cca700" # Foreground color of warning squigglies in the editor
  editorWarning.background: "#A9904000" # Background color of warning squigglies in the editor
  editorWarning.border: "#ffffff00" # Border color of warning squigglies in the editor
  editorInfo.foreground: "#75beff"
  editorInfo.background: "#4490BF00"
  editorInfo.border": #4490BF00"

  editorGutter.background: *BG # Background color of the editor gutter
  editorGutter.modifiedBackground: "#18b8a7" # Editor gutter background color for lines that are modified
  editorGutter.addedBackground: "#1dc057" # Editor gutter background color for lines that are added
  editorGutter.deletedBackground: "#c04b31" # Editor gutter background color for lines that are deleted
  editorGutter.foldingControlForeground: "#c5c5c5" # Editor gutter foreground color for the folding control

  # Explorer Colors
  gitDecoration.addedResourceForeground: "#81b88b"
  gitDecoration.modifiedResourceForeground: "#e2c08d"
  gitDecoration.deletedResourceForeground: "#c74e39"
  gitDecoration.untrackedResourceForeground: "#73c991"
  gitDecoration.ignoredResourceForeground: "#8c8c8c"
  gitDecoration.conflictingResourceForeground: "#6c6cc4"
  gitDecoration.stageDeletedResourceForeground: "#c74e39"
  gitDecoration.stageModifiedResourceForeground: "#e2c08d"
  gitDecoration.submoduleResourceForeground: "#8db9e2"

  # Diff Editor Colors
  diffEditor.insertedTextBackground: "#9bb95533" # Background color for inserted text
  diffEditor.removedTextBackground: "#ff000033" # Background color for removed text
  diffEditor.border: "#444444" # Outline color for removed text

  # Editor Widget Colors
  editorWidget.background: *BGDark # Background color of editor widgets, such as Find/Replace
  editorWidget.foreground: *FG # Foreground color of the editor widget
  editorWidget.resizeBorder: "#5F5F5F" # Border color of the editor widget unless the widget does not contain a border or defines its own border color

  editorSuggestWidget.background: *BGDark # Background color of the suggestion widget
  editorSuggestWidget.border: "#454545" # Border color of the suggestion widget
  editorSuggestWidget.foreground: *FG # Foreground color of the suggestion widget
  editorSuggestWidget.highlightForeground: *PINK # Color of the match highlights in the suggestion widget
  editorSuggestWidget.selectedBackground: *SELECTION # Background color of the selected entry in the suggestion widget

  editorHoverWidget.background: *BG # Background color of the editor hover
  editorHoverWidget.foreground: *FG # Foreground color of the editor hover
  editorHoverWidget.border: "#454545" # Border color of the editor hover

  debugExceptionWidget.background: *BGDark # Exception widget background color
  debugExceptionWidget.border: "#454545" # Exception widget border color

  editorMarkerNavigation.background: *BGDark # Editor marker navigation widget background
  editorMarkerNavigationError.background: "#f48771" # Editor marker navigation widget error color
  editorMarkerNavigationWarning.background: "#cca700" # Editor marker navigation widget warning color
  editorMarkerNavigationInfo.background: "#75beff" # Editor marker navigation widget info color

  # Peek View Colors
  peekView.border: *PURPLE # Color of the peek view borders and arrow
  peekViewEditor.background: *BGDark # Background color of the peek view editor
  peekViewEditorGutter.background: *BGDark # Background color of the gutter in the peek view editor
  peekViewEditor.matchHighlightBackground: "#fb968899" # Match highlight color in the peek view editor
  peekViewEditor.matchHighlightBorder: "#fb9688" # Match highlight border color in the peek view editor
  peekViewResult.background: *BG # Background color of the peek view result list
  peekViewResult.fileForeground: *WHITE # Foreground color for file nodes in the peek view result list
  peekViewResult.lineForeground: *FGLight # Foreground color for line nodes in the peek view result list
  peekViewResult.matchHighlightBackground: "#fb96884d" # Match highlight color in the peek view result list
  peekViewResult.selectionBackground: *SELECTION # Background color of the selected entry in the peek view result list
  peekViewResult.selectionForeground: *FGLight # Foreground color of the selected entry in the peek view result list
  peekViewTitle.background: *BGDark # Background color of the peek view title area
  peekViewTitleDescription.foreground: "#ccccccb3" # Color of the peek view title info
  peekViewTitleLabel.foreground: *FGLight # Color of the peek view title

  # Merge Conflicts
  merge.currentHeaderBackground: "#367366" # Current header background in inline merge conflicts
  merge.currentContentBackground: "#27403b" # Current content background in inline merge conflicts
  merge.incomingHeaderBackground: "#74398f" # Incoming header background in inline merge conflicts
  merge.incomingContentBackground: "#43284b" # Incoming content background in inline merge conflicts
  merge.commonHeaderBackground: *SELECTION # Common header background in inline merge conflicts
  merge.commonContentBackground: "#282828" # Common content background in inline merge conflicts
  merge.border: # Border color on headers and the splitter in inline merge conflicts
  editorOverviewRuler.currentContentForeground: "#367366" # Current overview ruler foreground for inline merge conflicts
  editorOverviewRuler.incomingContentForeground: "#74398f" # Incoming overview ruler foreground for inline merge conflicts

  # Panel Colors
  panel.background: *BG # Panel background color
  panel.border: "#80808059" # Panel border color on the top separating to the editor
  panelTitle.activeBorder: "#e7e7e7" # Border color for the active panel title
  panelTitle.activeForeground: "#e7e7e7" # Title color for the active panel
  panelTitle.inactiveForeground: "#e7e7e799" # Title color for the inactive panel

  # Status Bar Colors
  statusBar.background: *BGDark # Standard Status Bar background color
  statusBar.foreground: *YELLOW # Status Bar foreground color
  statusBar.border: *BG # Status Bar border color on the top separating to the editor
  statusBar.debuggingBackground: *ORANGE # Status Bar background color when a program is being debugged
  statusBar.debuggingForeground: *SELECTION # Status Bar foreground color when a program is being debugged
  statusBar.debuggingBorder: *BG
  statusBar.noFolderBackground: *PURPLE # Status Bar foreground color when no folder is opened
  statusBar.noFolderForeground: *SELECTION # Status Bar background color when no folder is opened
  statusBar.noFolderBorder: *BG
  statusBarItem.activeBackground: "#FFFFFF25" # Status Bar item background color when clicking
  statusBarItem.hoverBackground: "#ffffff1f" # Status Bar item background color when hovering
  statusBarItem.prominentBackground: # Status Bar prominent items background color. Prominent items stand out from other Status Bar entries to indicate importance
  statusBarItem.prominentHoverBackground: # Status Bar prominent items background color when hovering. Prominent items stand out from other Status Bar entries to indicate importance
  statusBarItem.remoteForeground: *SELECTION # Background color for the remote indicator on the status bar
  statusBarItem.remoteBackground: *GREEN # Foreground color for the remote indicator on the status bar

  # Title Bar Colors (MacOS Only)
  titleBar.activeBackground: *BG # Title Bar background when the window is active
  titleBar.activeForeground: *FG # Title Bar foreground when the window is active
  titleBar.inactiveBackground: "#1e1e2a99" # Title Bar background when the window is inactive
  titleBar.inactiveForeground: "#cccccc99" # Title Bar foreground when the window is inactive
  titleBar.border: "#00000000" # Title Bar border color (note: setting this to null will remove the border completely)

  # Extensions
  extensionButton.prominentForeground: # Extension view button foreground color (for example Install button)
  extensionButton.prominentBackground: # Extension view button background color
  extensionButton.prominentHoverBackground: # Extension view button background hover color

  # Quick Picker
  pickerGroup.border: "#3f3f46" # Quick picker (Quick Open) color for grouping borders
  pickerGroup.foreground: *PINK # Quick picker (Quick Open) color for grouping labels

  # Debug
  debugToolBar.background: *BGDark # Debug toolbar background color
  debugToolBar.border: "#474747" # Debug toolbar border color

  # Welcome Page
  welcomePage.buttonBackground: # Background color for the buttons on the Welcome page
  welcomePage.buttonHoverBackground: # Hover background color for the buttons on the Welcome page
  walkThrough.embeddedEditorBackground: *BGDark # Background color for the embedded editors on the Interactive Playground

  # Setting Editor
  settings.headerForeground: *FG # The foreground color for a section header or active title
  settings.focusedRowBackground: "#ffffff07"
  settings.modifiedItemIndicator: # The color of the line that indicates a modified setting
  settings.inactiveSelectedItemBorder: # The color of the selected setting row border, when the settings list does not have focus
  settings.dropdownBackground: # Dropdown background
  settings.dropdownForeground: # Dropdown foreground
  settings.dropdownBorder: # Dropdown border
  settings.checkboxBackground: # Checkbox background
  settings.checkboxForeground: # Checkbox foreground
  settings.checkboxBorder: # Checkbox border
  settings.textInputBackground: # Text input box background
  settings.textInputForeground: # Text input box foreground
  settings.textInputBorder: # Text input box border
  settings.numberInputBackground: # Number input box background
  settings.numberInputForeground: # Number input box foreground
  settings.numberInputBorder: # Number input box border

  # Breadcrumbs
  breadcrumb.foreground: *FG # Color of breadcrumb items
  breadcrumb.background: *BGDark
  breadcrumb.focusForeground: *FGLight # Color of focused breadcrumb items
  breadcrumb.activeSelectionForeground: *FGLight # Color of selected breadcrumb items
  breadcrumbPicker.background: # Background color of breadcrumb item picker

  # Misc
  menu.foreground: *FG
  menu.background: *BGDark
  menu.selectionForeground: *WHITE
  menu.selectionBackground: *SELECTION
  menu.selectionBorder: "#00000000"
  menu.separatorBackground: "#bbbbbb"
  menu.border: "#00000085"
  listFilterWidget.background: "#653723" # Background color of the type filter widget in lists and trees.
  listFilterWidget.outline: "#00000000" # Outline color of the type filter widget in lists and trees.
  listFilterWidget.noMatchesOutline: "#be1100" # Outline color of the type filter widget in lists and trees, when there are no matches.

# Syntaxes
tokenColors:
  # =============================================================================
  # General
  # =============================================================================

  - scope:
      - emphasis
    settings:
      fontStyle: italic
  - scope:
      - strong
    settings:
      fontStyle: bold
  - scope:
      - header
    settings:
      foreground: *PURPLE

  # Diffs
  # ======
  - scope:
      - meta.diff
      - meta.diff.header
    settings:
      foreground: *COMMENT
  - scope:
      - markup.inserted
    settings:
      foreground: *ORANGE
  - scope:
      - markup.deleted
    settings:
      foreground: *RED
  - scope:
      - markup.changed
    settings:
      foreground: *GREEN
  - scope:
      - invalid
    settings:
      foreground: *RED
      fontStyle: underline italic
  - scope:
      - invalid.deprecated
    settings:
      foreground: *FG
      fontStyle: underline italic
  - scope:
      - entity.name.filename
    settings:
      foreground: *YELLOW
  - scope:
      - markup.error
    settings:
      foreground: *RED

  # Markdown / RST / Prose
  # ======================

  - name: Underlined markup
    scope:
      - markup.underline
    settings:
      fontStyle: underline

  - name: Bold markup
    scope:
      - markup.bold
    settings:
      fontStyle: bold
      foreground: *GREEN

  - name: Markup headings
    scope:
      - markup.heading
    settings:
      fontStyle: bold
      foreground: *PURPLE

  - name: Markup italic
    scope:
      - markup.italic
    settings:
      foreground: *YELLOW
      fontStyle: italic

  - name: Bullets, lists (prose)
    scope:
      - beginning.punctuation.definition.list.markdown
      - beginning.punctuation.definition.quote.markdown
      - punctuation.definition.link.restructuredtext
    settings:
      foreground: *CYAN

  - name: Inline code (prose)
    scope:
      - markup.inline.raw
      - markup.raw.restructuredtext
    settings:
      foreground: *ORANGE

  - name: Links (prose)
    scope:
      - markup.underline.link
      - markup.underline.link.image
    settings:
      foreground: *CYAN

  - name: Link text, image alt text (prose)
    scope:
      - meta.link.reference.def.restructuredtext
      - punctuation.definition.directive.restructuredtext
      - string.other.link.description
      - string.other.link.title
    settings:
      foreground: *PINK

  - name: Blockquotes (prose)
    scope:
      - entity.name.directive.restructuredtext
      - markup.quote
    settings:
      foreground: *YELLOW
      fontStyle: italic

  - name: Horizontal rule (prose)
    scope:
      - meta.separator.markdown
    settings:
      foreground: *COMMENT

  - name: Code blocks
    scope:
      - fenced_code.block.language
      - markup.raw.inner.restructuredtext
      - markup.fenced_code.block.markdown punctuation.definition.markdown
    settings:
      foreground: *ORANGE

  - name: Prose constants
    scope:
      - punctuation.definition.constant.restructuredtext
    settings:
      foreground: *PURPLE

  - name: Braces in markdown headings
    scope:
      - markup.heading.markdown punctuation.definition.string.begin
      - markup.heading.markdown punctuation.definition.string.end
    settings:
      foreground: *PURPLE

  - name: Braces in markdown paragraphs
    scope:
      - meta.paragraph.markdown punctuation.definition.string.begin
      - meta.paragraph.markdown punctuation.definition.string.end
    settings:
      foreground: *FG

  - name: Braces in markdown blockquotes
    scope:
      - markup.quote.markdown meta.paragraph.markdown punctuation.definition.string.begin
      - markup.quote.markdown meta.paragraph.markdown punctuation.definition.string.end
    settings:
      foreground: *YELLOW

  # =============================================================================
  # Classes
  # =============================================================================

  - name: User-defined class names
    scope:
      - entity.name.type.class
      - entity.name.function
      - entity.name.class
    settings:
      foreground: *CYAN
      fontStyle: normal

  - name: User-defined functions names
    scope:
      - entity.name.function
    settings:
      foreground: *GREEN
      fontStyle: normal

  - name: this, super, self, etc.
    scope:
      - keyword.expressions-and-types.swift
      - keyword.other.this
      - variable.language
      - variable.language punctuation.definition.variable.php # the "$" symbol in $this
      - variable.other.readwrite.instance.ruby # ruby's "@" instance symbol
      - variable.parameter.function.language.special # Special words as parameters
    settings:
      foreground: *CYAN
      fontStyle: italic

  - name: Inherited classes
    scope:
      - entity.other.inherited-class
    settings:
      fontStyle: italic
      foreground: *CYAN

  # =============================================================================
  # Comments
  # =============================================================================

  - name: Comments
    scope:
      - comment
      - punctuation.definition.comment
      - unused.comment
      - wildcard.comment
    settings:
      foreground: *COMMENT

  - name: JSDoc-style keywords
    scope:
      - comment keyword.codetag.notation
      - comment.block.documentation keyword
      - comment.block.documentation storage.type.class
    settings:
      foreground: *PINK

  - name: JSDoc-style types
    scope:
      - comment.block.documentation entity.name.type
    settings:
      foreground: *CYAN
      fontStyle: italic

  - name: JSDoc-style type brackets
    scope:
      - comment.block.documentation entity.name.type punctuation.definition.bracket
    settings:
      foreground: *CYAN

  - name: JSDoc-style comment parameters
    scope:
      - comment.block.documentation variable
    settings:
      foreground: *GREEN
      fontStyle: italic

  # =============================================================================
  # Constants
  # =============================================================================

  - name: Constants
    scope:
      - constant
      - variable.other.constant
    settings:
      foreground: *PURPLE

  - name: Constant escape sequences
    scope:
      - constant.character.escape
      - constant.character.string.escape
      - constant.regexp
    settings:
      foreground: *PINK

  # =============================================================================
  # Entities
  # =============================================================================

  - name: HTML tags
    scope:
      - entity.name.tag
    settings:
      foreground: *PINK

  - name: CSS attribute parent selectors ('&')
    scope:
      - entity.other.attribute-name.parent-selector
    settings:
      foreground: *PINK

  - name: HTML/CSS attribute names
    scope:
      - entity.other.attribute-name
    settings:
      foreground: *GREEN
      fontStyle: italic

  # =============================================================================
  # Functions/Methods
  # =============================================================================

  - name: Function names
    scope:
      - meta.function-call.object
      - meta.function-call.php
      - meta.function-call.static
      - meta.method-call.java meta.method
      - meta.method.groovy
      - support.function.any-method.lua
      - keyword.operator.function.infix
    settings:
      foreground: *ORANGE

  - name: Function parameters
    scope:
      - entity.name.variable.parameter
      - meta.at-rule.function variable # Sass function params
      - meta.at-rule.mixin variable # Sass mixin params
      - meta.function.arguments variable.other.php
      - meta.selectionset.graphql meta.arguments.graphql variable.arguments.graphql
      - variable.parameter
    settings:
      fontStyle: italic
      foreground: *GREEN

  - name: Decorators
    scope:
      - meta.decorator variable.other.readwrite
      - meta.decorator variable.other.property
    settings:
      foreground: *ORANGE
      fontStyle: italic

  - name: Decorator Objects
    scope:
      - meta.decorator variable.other.object
    settings:
      foreground: *ORANGE

  # =============================================================================
  # Keywords
  # =============================================================================

  - name: Keywords
    scope:
      - keyword
      - punctuation.definition.keyword
    settings:
      foreground: *PINK

  - name: Keyword "new"
    scope:
      - keyword.control.new
      - keyword.operator.new
    settings:
      fontStyle: bold

  - name: Generic selectors (CSS/SCSS/Less/Stylus)
    scope:
      - meta.selector
    settings:
      foreground: *PINK

  # =============================================================================
  # Language Built-ins
  # =============================================================================

  - name: Language Built-ins
    scope:
      - support
    settings:
      fontStyle: italic
      foreground: *CYAN

  - name: Built-in magic functions and constants
    scope:
      - support.function.magic
      - support.variable
      - variable.other.predefined
    settings:
      fontStyle: regular
      foreground: *PURPLE

  - name: Built-in functions / properties
    scope:
      - support.function
      - support.type.property-name
    settings:
      fontStyle: regular
      foreground: *YELLOW

  # =============================================================================
  # Punctuation
  # =============================================================================

  - name: Separators (key/value, namespace, inheritance, pointer, hash, slice, etc)
    scope:
      - constant.other.symbol.hashkey punctuation.definition.constant.ruby
      - entity.other.attribute-name.placeholder punctuation # Sass placeholder `%` symbols
      - entity.other.attribute-name.pseudo-class punctuation
      - entity.other.attribute-name.pseudo-element punctuation
      - meta.group.double.toml
      - meta.group.toml
      - meta.object-binding-pattern-variable punctuation.destructuring
      - punctuation.colon.graphql
      - punctuation.definition.block.scalar.folded.yaml
      - punctuation.definition.block.scalar.literal.yaml
      - punctuation.definition.block.sequence.item.yaml
      - punctuation.definition.entity.other.inherited-class
      - punctuation.function.swift
      - punctuation.separator.dictionary.key-value
      - punctuation.separator.hash
      - punctuation.separator.inheritance
      - punctuation.separator.key-value
      - punctuation.separator.key-value.mapping.yaml
      - punctuation.separator.namespace
      - punctuation.separator.pointer-access
      - punctuation.separator.slice
      - string.unquoted.heredoc punctuation.definition.string
      - support.other.chomping-indicator.yaml
      - punctuation.separator.annotation
    settings:
      foreground: *PINK

  - name: Brackets, braces, parens, etc.
    scope:
      - keyword.operator.other.powershell # Commas
      - keyword.other.statement-separator.powershell
      - meta.brace.round
      - meta.function-call punctuation
      - punctuation.definition.arguments.begin
      - punctuation.definition.arguments.end
      - punctuation.definition.entity.begin
      - punctuation.definition.entity.end
      - punctuation.definition.tag.cs # HTML tags in comments
      - punctuation.definition.type.begin
      - punctuation.definition.type.end
      - punctuation.section.scope.begin
      - punctuation.section.scope.end
      - punctuation.terminator.expression.php
      - storage.type.generic.java
      - string.template meta.brace
      - string.template punctuation.accessor
    settings:
      foreground: *FG

  - name: Variable interpolation operators
    scope:
      - meta.string-contents.quoted.double punctuation.definition.variable
      - punctuation.definition.interpolation.begin
      - punctuation.definition.interpolation.end
      - punctuation.definition.template-expression.begin
      - punctuation.definition.template-expression.end
      - punctuation.section.embedded.begin
      - punctuation.section.embedded.coffee
      - punctuation.section.embedded.end
      - punctuation.section.embedded.end source.php # PHP edge case
      - punctuation.section.embedded.end source.ruby # Issue with ruby's tmLanguage
      - punctuation.definition.variable.makefile
    settings:
      foreground: *PINK

  # =============================================================================
  # Serializable / Config Langages
  # =============================================================================

  - name: Keys (serializable languages)
    scope:
      - entity.name.function.target.makefile
      - entity.name.section.toml
      - entity.name.tag.yaml
      - variable.other.key.toml
    settings:
      foreground: *CYAN

  - name: Dates / timestamps (serializable languages)
    scope:
      - constant.other.date
      - constant.other.timestamp
    settings:
      foreground: *GREEN

  - name: YAML aliases
    scope:
      - variable.other.alias.yaml
    settings:
      fontStyle: italic underline
      foreground: *ORANGE

  # =============================================================================
  # Storage
  # =============================================================================

  - name: Storage
    scope:
      - storage
      - meta.implementation storage.type.objc
      - meta.interface-or-protocol storage.type.objc
      - source.groovy storage.type.def
    settings:
      fontStyle: regular
      foreground: *PINK

  - name: Types
    scope:
      - keyword.primitive-datatypes.swift
      - keyword.type.cs
      - meta.protocol-list.objc
      - meta.return-type.objc
      - source.go storage.type
      - source.groovy storage.type
      - source.java storage.type
      - source.powershell entity.other.attribute-name
      - storage.class.std.rust
      - storage.type.attribute.swift
      - storage.type.c
      - storage.type.core.rust
      - storage.type.cs
      - storage.type.groovy
      - storage.type.objc
      - storage.type.php
      - storage.type.haskell
      - storage.type.ocaml
    settings:
      fontStyle: italic
      foreground: *CYAN

  - name: Types entity
    scope:
      - entity.name.type
      - entity.name.type.interface
    settings:
      fontStyle: italic
      foreground: *PURPLE

  - name: Generics, templates, and mapped type declarations
    scope:
      - entity.name.type.type-parameter
      - meta.indexer.mappedtype.declaration entity.name.type # Mapped type declarations
      - meta.type.parameters entity.name.type # Generic type declarations
    settings:
      foreground: *GREEN

  - name: Modifiers
    scope:
      - storage.modifier
    settings:
      foreground: *PINK

  # =============================================================================
  # RegExp
  # =============================================================================

  - name: RegExp string
    scope:
      - string.regexp
      - constant.other.character-class.set.regexp
      - constant.character.escape.backslash.regexp
    settings:
      foreground: *YELLOW

  - name: Non-capture operators
    scope:
      # NOTE: The scope name is a misnomer. It is actually non-capture operators
      - punctuation.definition.group.capture.regexp
    settings:
      foreground: *PINK

  - name: RegExp start and end characters
    scope:
      - string.regexp punctuation.definition.string.begin
      - string.regexp punctuation.definition.string.end
    settings:
      foreground: *RED

  - name: Character group
    scope:
      - punctuation.definition.character-class.regexp
    settings:
      foreground: *CYAN

  - name: Capture groups
    scope:
      - punctuation.definition.group.regexp
    settings:
      foreground: *GREEN

  - name: Assertion operators
    scope:
      - punctuation.definition.group.assertion.regexp
      - keyword.operator.negation.regexp
    settings:
      foreground: *RED

  - name: Positive lookaheads
    scope:
      - meta.assertion.look-ahead.regexp
    settings:
      foreground: *ORANGE

  # =============================================================================
  # Strings
  # =============================================================================

  - name: Strings
    scope:
      - string
    settings:
      foreground: *ORANGE

  - name: String quotes (temporary vscode fix)
    scope:
      # NOTE: This is a temporary fix for VSCode expand selection.
      # See (https://github.com/Microsoft/vscode/issues/4795)
      - punctuation.definition.string.begin
      - punctuation.definition.string.end
    settings:
      foreground: *TEMP_QUOTES

  - name: Property quotes (temporary vscode fix)
    scope:
      # NOTE: Same as above
      - punctuation.support.type.property-name.begin
      - punctuation.support.type.property-name.end
    settings:
      foreground: *TEMP_PROPERTY_QUOTES

  - name: Docstrings
    scope:
      - string.quoted.docstring.multi
      - string.quoted.docstring.multi.python punctuation.definition.string.begin
      - string.quoted.docstring.multi.python punctuation.definition.string.end
      - string.quoted.docstring.multi.python constant.character.escape
    settings:
      foreground: *COMMENT

  # =============================================================================
  # Variables
  # =============================================================================

  - name: Variables and object properties
    scope:
      - variable
      - constant.numeric
      - constant.other.key.perl # Perl edge case
      - support.variable.property # Object properties
      - variable.other.constant.js # Fix incorrect highlighting of pseudo-constants in js, jsx
      - variable.other.constant.ts # Fixes incorrect highlighting of pseudo-constants in ts
      - variable.other.constant.tsx # Fixes incorrect highlighting of pseudo-constants in tsx
    settings:
      foreground: *YELLOW

  - name: Variables numeric
    scope:
      - constant.numeric
    settings:
      foreground: *FGLight

  - name: Destructuring / aliasing reference name (LHS)
    scope:
      - meta.import variable.other.readwrite # Module import aliasing (real name)
      - meta.variable.assignment.destructured.object.coffee variable # Object destructuring property (coffeescript)
    settings:
      fontStyle: italic
      foreground: *GREEN

  - name: Destructuring / aliasing variable name (RHS)
    scope:
      - meta.import variable.other.readwrite.alias # Module import aliasing (alias name)
      - meta.export variable.other.readwrite.alias # Module import aliasing (alias name)
      - meta.variable.assignment.destructured.object.coffee variable variable # Object destructuring variable (coffeescript)
    settings:
      fontStyle: normal
      foreground: *FG

  # =============================================================================
  # Language Extensions / Edge Cases
  # =============================================================================

  # GraphQL
  # =======
  - name: GraphQL keys
    scope:
      - meta.selectionset.graphql variable
    settings:
      foreground: *YELLOW

  - name: GraphQL function arguments
    scope:
      - meta.selectionset.graphql meta.arguments variable
    settings:
      foreground: *FG

  - name: GraphQL fragment name (definition)
    scope:
      - entity.name.fragment.graphql
      - variable.fragment.graphql
    settings:
      foreground: *CYAN

  # Edge Cases
  # ==========
  - name: Edge cases (foreground color resets)
    scope:
      - constant.other.symbol.hashkey.ruby # Ruby hash keys
      - keyword.operator.dereference.java # Java dot access
      - keyword.operator.navigation.groovy # groovy dot access
      - meta.scope.for-loop.shell punctuation.definition.string.begin
      - meta.scope.for-loop.shell punctuation.definition.string.end
      - meta.scope.for-loop.shell string
      - storage.modifier.import # Java / Groovy imports
      - punctuation.section.embedded.begin.tsx
      - punctuation.section.embedded.end.tsx
      - punctuation.section.embedded.begin.jsx
      - punctuation.section.embedded.end.jsx
      - punctuation.separator.list.comma.css # Commas separating selectors in CSS
      - constant.language.empty-list.haskell
    settings:
      foreground: *FG

  # This is set to conform to the standard of coloring langage constants purple.
  # In this case, this colors "$?", "$@", "$*", "$1", etc..
  - name: Shell variables prefixed with "$" (edge case)
    scope:
      - source.shell variable.other
    settings:
      foreground: *PURPLE

  - name: Powershell constants mistakenly scoped to `support`, rather than `constant` (edge)
    scope:
      - support.constant
    settings:
      fontStyle: normal
      foreground: *PURPLE

  - name: Makefile prerequisite names
    scope:
      - meta.scope.prerequisites.makefile
    settings:
      foreground: *YELLOW

  - name: SCSS attibute selector strings
    scope:
      - meta.attribute-selector.scss
    settings:
      foreground: *YELLOW

  - name: SCSS attribute selector brackets
    scope:
      - punctuation.definition.attribute-selector.end.bracket.square.scss
      - punctuation.definition.attribute-selector.begin.bracket.square.scss
    settings:
      foreground: *FG

  - name: Haskell Pragmas
    scope:
      - meta.preprocessor.haskell
    settings:
      foreground: *COMMENT

  - name: Log file error
    scope:
      - log.error
    settings:
      foreground: *RED
      fontStyle: bold

  - name: Log file warning
    scope:
      - log.warning
    settings:
      foreground: *YELLOW
      fontStyle: bold
